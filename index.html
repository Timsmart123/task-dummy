<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
</head>
<body>
  <header>
    <h1>Task Manager</h1>
    <p>Track tasks for the team</p>
  </header>

  <main>
    <section>
      <h2>Add Task</h2>
      <input type="text" id="taskInput" placeholder="Enter task name">
      <input type="text" id="userInput" placeholder="Assigned to">
      <button id="addTaskBtn" >Add Task</button>
    </section>

    <section>
      <h2>Tasks</h2>
      <p id="emptyState">No tasks yet.</p>
      <ul id="taskList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
